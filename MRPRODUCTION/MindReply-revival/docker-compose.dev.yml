version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mindreply-db-dev
    environment:
      POSTGRES_DB: mindreply_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mindreply-redis-dev
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mindreply-backend-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://dev_user:dev_password@postgres:5432/mindreply_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_key_min_32_chars_long_here
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mindreply-frontend-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '5000:5000'
    depends_on:
      - backend
    volumes:
      - ./:/app
      - /app/.next
      - /app/node_modules

  n8n:
    image: n8nio/n8n:latest
    container_name: mindreply-n8n-dev
    ports:
      - '5678:5678'
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_TUNNEL_URL: http://localhost:5678/
      N8N_BASIC_AUTH_ACTIVE: false
    volumes:
      - n8n_dev_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows

volumes:
  postgres_dev_data:
  n8n_dev_data:
