name: Generate Changelog

on:
  push:
    branches: [main, master]
  release:
    types: [published]
- name: Zapier Push
  uses: NourNafea/zapier-push-action@rc3.7.24
  
jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Changelog
        env:
          WEBHOOK_SECRET: ${{ secrets.AUTOCHANGELOG_WEBHOOK_SECRET }}
        run: |
          BODY='{"bump": "patch"}'
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
          curl -X POST https://autochangelog.com/api/v1/hooks/f99df332-7fdc-46ea-8c56-ccd5d5f4a605 \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: sha256=$SIGNATURE" \
            -d "$BODY"
