version: '3'

services:
  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: mindreply-admin
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001
      PORT: 3002
    ports:
      - '3002:3002'
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mindreply-backend
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://admin_user:secure_password@postgres:5432/mindreply_admin
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: dhi.io/postgres:15-alpine3.24
    container_name: mindreply-db-admin
    environment:
      POSTGRES_DB: mindreply_admin
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_admin_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    container_name: mindreply-redis-admin
    ports:
      - '6379:6379'
    volumes:
      - redis_admin_data:/data

volumes:
  postgres_admin_data:
  redis_admin_data:
