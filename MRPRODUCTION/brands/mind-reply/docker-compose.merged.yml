# Merged docker-compose for complete stack with Docker Hardened Images
version: '3.8'

services:
  postgres:
    image: dhi.io/postgres:15-alpine
    container_name: mindreply-db
    environment:
      POSTGRES_DB: mindreply
      POSTGRES_USER: mindreply
      POSTGRES_PASSWORD: mindreply_dev_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindreply"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindreply-network

  redis:
    image: dhi.io/redis:7
    container_name: mindreply-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindreply-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindreply-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://mindreply:mindreply_dev_2024@postgres:5432/mindreply
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_key_min_32_chars_long_here_123456
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-test-key}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-test-id}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-test-secret}
      API_PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
    networks:
      - mindreply-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mindreply-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_API_ENDPOINT: http://backend:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
    networks:
      - mindreply-network

  n8n:
    image: n8nio/n8n:latest
    container_name: mindreply-n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: n8n_dev_password
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: mindreply
      DB_POSTGRESDB_PASSWORD: mindreply_dev_2024
    ports:
      - '5678:5678'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    networks:
      - mindreply-network

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local

networks:
  mindreply-network:
    driver: bridge
