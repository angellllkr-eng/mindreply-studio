version: '3.8'

services:
  postgres:
    image: dhi.io/postgres:15-alpine3.24
    container_name: mindreply-db
    environment:
      POSTGRES_DB: mindreply
      POSTGRES_USER: mindreply_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindreply_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindreply

  redis:
    image: dhi.io/redis:7-alpine3.24
    container_name: mindreply-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindreply

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mindreply-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mindreply_user:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/mindreply
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: info
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mindreply

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mindreply-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - '5000:5000'
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mindreply

  n8n:
    image: n8nio/n8n:latest
    container_name: mindreply-n8n
    ports:
      - '5678:5678'
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_TUNNEL_URL: http://n8n:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: mindreply_n8n
      DB_POSTGRESDB_USER: mindreply_user
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: ${N8N_ADMIN_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_ADMIN_PASSWORD:-secure_password}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mindreply

  sentry:
    image: sentry:latest
    container_name: mindreply-sentry
    ports:
      - '9000:9000'
    environment:
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
    volumes:
      - sentry_data:/data
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - mindreply

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  sentry_data:

networks:
  mindreply:
    driver: bridge
